services:
  # MongoDB Database (External - MongoDB Atlas recommended)
  # See TODO.md Step 5 for Atlas setup. Use the URI in backend envVars below.
  
  # Backend API Service
  - type: web
    name: zenrestro-api
    env: node
    plan: starter
    region: singapore
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: MONGODB_URI
        sync: false
        generateValue: false  # Set manually from Atlas
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"  # Render web default
      - key: ALLOWED_ORIGINS
        value: "https://zenrestro-web.onrender.com,http://localhost:5173"
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: zenrestro-web
    env: node
    plan: starter
    region: singapore
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: $ZENRESTRO_API_URL/api  # Render auto-provides service URLs
    autoDeploy: false
